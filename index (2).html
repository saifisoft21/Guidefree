<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>GuideFree Pro | دليلك للمواقع والحيل المجانية</title>
<meta name="description" content="اكتشف أفضل الأدوات والمواقع المجانية للتصميم، المونتاج، والذكاء الاصطناعي مع GuideFree Pro. وفر أموالك وضاعف إنتاجيتك من خلال حيل سرية وحصرية.">
<meta name="keywords" content="مواقع مجانية, حيل سرية, ذكاء اصطناعي, تصميم, مونتاج, زيادة الإنتاجية, توفير المال, GuideFree Pro, أدوات مجانية">
<link rel="icon" href="https://ui-avatars.com/api/?name=G&background=ffffff&color=9C27B0&size=144&bold=true" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --primary-accent: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #e2e8f0;
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05);
            --shadow-hover: 0 20px 25px -5px rgba(0,0,0,0.1);
            --radius-lg: 16px;
            --radius-full: 9999px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-color: #0b0f19;
            --surface-color: #111827;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #1f2937;
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.4);
            --shadow-hover: 0 20px 25px -5px rgba(0,0,0,0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg-color); color: var(--text-primary); line-height: 1.6; transition: 0.3s; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }
        .hidden { display: none !important; }

        #r-prog { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--primary-accent), #8b5cf6); z-index: 10000; width: 0%; transition: width 0.1s; }

        .navbar { position: sticky; top: 0; background: rgba(var(--surface-color), 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); z-index: 1000; padding: 12px 0; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 1.7rem; font-weight: 900; }
        .brand span { color: var(--primary-accent); }
        .nav-actions { display: flex; gap: 15px; align-items: center; }
        
        .btn-icon { background: none; border: none; font-size: 1.3rem; color: var(--text-primary); cursor: pointer; transition: var(--transition); }
        .btn-icon:hover { color: var(--primary-accent); transform: rotate(15deg); }
        .btn-external { background: #25D366; color: #fff; padding: 8px 18px; border-radius: var(--radius-full); font-weight: 700; font-size: 0.95rem; transition: var(--transition); }
        .btn-external:hover { background: #128C7E; transform: translateY(-2px); }

        .hero-section { text-align: center; padding: 80px 20px 60px; background: radial-gradient(circle at top, color-mix(in srgb, var(--primary-accent) 8%, transparent) 0%, transparent 70%); }
        .hero-title { font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 900; margin-bottom: 15px; background: linear-gradient(135deg, var(--text-primary), var(--primary-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2; }
        .hero-subtitle { font-size: clamp(1rem, 2vw, 1.2rem); color: var(--text-secondary); margin-bottom: 40px; }

        .search-wrapper { max-width: 700px; margin: 0 auto; position: relative; }
        .search-icon { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 1.2rem; }
        #live-search { width: 100%; padding: 18px 50px 18px 20px; border: 2px solid var(--border-color); border-radius: var(--radius-full); background: var(--surface-color); color: var(--text-primary); font-size: 1.1rem; font-family: inherit; transition: var(--transition); box-shadow: var(--shadow-sm); }
        #live-search:focus { outline: none; border-color: var(--primary-accent); box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary-accent) 15%, transparent); }

        .main-container { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; min-height: 50vh; }

        .filter-chips { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 30px; scrollbar-width: none; }
        .filter-chips::-webkit-scrollbar { display: none; }
        .chip { padding: 10px 24px; border: 1px solid var(--border-color); background: var(--surface-color); color: var(--text-primary); border-radius: var(--radius-full); font-weight: 700; cursor: pointer; transition: var(--transition); white-space: nowrap; font-family: inherit; font-size: 0.95rem; }
        .chip:hover { border-color: var(--primary-accent); color: var(--primary-accent); }
        .chip.active { background: var(--text-primary); color: var(--bg-color); border-color: var(--text-primary); }

        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        .card { background: var(--surface-color); border-radius: var(--radius-lg); border: 1px solid var(--border-color); overflow: hidden; transition: var(--transition); display: flex; flex-direction: column; box-shadow: var(--shadow-sm); position: relative; }
        .card:hover { transform: translateY(-8px); box-shadow: var(--shadow-hover); border-color: color-mix(in srgb, var(--primary-accent) 40%, transparent); }
        .card-img-wrap { position: relative; height: 200px; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .card-img { transform: scale(1.08); }
        .card-badge { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.9); color: var(--primary-accent); padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 900; }
        .card-content { padding: 20px; display: flex; flex-direction: column; flex: 1; }
        .card-title { font-size: 1.3rem; font-weight: 900; margin-bottom: 10px; line-height: 1.4; }
        .card-desc { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.6; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 15px; color: var(--primary-accent); font-weight: 700; font-size: 0.95rem; }
        .card:hover .arrow-icon { transform: translateX(-5px); }
        
        .skel { animation: shimmer 1.5s infinite linear; background: linear-gradient(90deg, var(--border-color) 25%, color-mix(in srgb, var(--border-color) 60%, transparent) 50%, var(--border-color) 75%); background-size: 400% 100%; }
        .sk-card { background: var(--surface-color); border-radius: var(--radius-lg); padding: 20px; border: 1px solid var(--border-color); }
        .sk-img { height: 180px; border-radius: 8px; margin-bottom: 20px; }
        .sk-t { height: 20px; width: 70%; margin-bottom: 15px; border-radius: 4px; }
        .sk-d { height: 14px; width: 100%; margin-bottom: 10px; border-radius: 4px; }
        .sk-d.short { width: 40%; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 3.5rem; margin-bottom: 15px; opacity: 0.5; }

        .footer { text-align: center; padding: 25px; background: var(--surface-color); border-top: 1px solid var(--border-color); color: var(--text-secondary); font-weight: 500; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div id="r-prog"></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="brand">guidefree <span>pro</span></a>
            <div class="nav-actions">
                <button id="t-tog" class="btn-icon"><i class="fa-solid fa-moon"></i></button>
                <a href="https://wa.me/212607729170" target="_blank" class="btn-external"><i class="fa-brands fa-whatsapp"></i> تواصل معنا</a>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <h1 class="hero-title">دليلك الشامل للحيل والمواقع المجانية</h1>
        <p class="hero-subtitle">اكتشف أفضل الأدوات السرية، وفر أموالك، وضاعف إنتاجيتك</p>
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="live-search" autocomplete="off" placeholder="ابحث عن أداة، كورس، أو حيلة...">
        </div>
    </header>

    <main class="main-container">
        <div class="filter-chips">
            <button class="chip active" data-filter="all">الكل</button>
            <button class="chip" data-filter="ai">أدوات ذكاء اصطناعي</button>
            <button class="chip" data-filter="design">تصميم ومونتاج</button>
            <button class="chip" data-filter="tricks">حيل وأسرار</button>
        </div>

        <div id="sk-cont" class="grid-layout">
            <div class="sk-card"><div class="skel sk-img"></div><div class="skel sk-t"></div><div class="skel sk-d"></div><div class="skel sk-d short"></div></div>
            <div class="sk-card"><div class="skel sk-img"></div><div class="skel sk-t"></div><div class="skel sk-d"></div><div class="skel sk-d short"></div></div>
            <div class="sk-card"><div class="skel sk-img"></div><div class="skel sk-t"></div><div class="skel sk-d"></div><div class="skel sk-d short"></div></div>
        </div>

        <div id="grid-cont" class="grid-layout hidden"></div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 guidefree pro. جميع الحقوق محفوظة.</p>
    </footer>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const d = document;
        let _p = [];
        let _f = 'all';
        let _s = '';

        const init = async () => {
            try {
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const sn = await getDocs(q);
                sn.forEach(doc => _p.push({ id: doc.id, ...doc.data() }));
                render();
            } catch (e) {
                d.getElementById('sk-cont').innerHTML = '<div class="empty-state"><p>حدث خطأ في الاتصال بالخادم.</p></div>';
            }
        };

        const render = () => {
            const g = d.getElementById('grid-cont');
            let res = _p;

            if (_f !== 'all') res = res.filter(x => x.category === _f);
            if (_s) res = res.filter(x => x.title.toLowerCase().includes(_s) || x.content.toLowerCase().includes(_s));

            if (res.length === 0) {
                g.innerHTML = '<div class="empty-state"><i class="fa-solid fa-box-open"></i><h2>لا توجد نتائج</h2><p>حاول البحث بكلمات مختلفة.</p></div>';
            } else {
                g.innerHTML = res.map(x => `
                    <a href="article.html?id=${x.id}" class="card">
                        <div class="card-img-wrap">
                            <span class="card-badge">${x.category === 'ai' ? 'ذكاء اصطناعي' : x.category === 'design' ? 'تصميم ومونتاج' : x.category === 'tricks' ? 'حيل وأسرار' : 'عام'}</span>
                            <img src="${x.imageUrl}" class="card-img" alt="${x.title}" loading="lazy">
                        </div>
                        <div class="card-content">
                            <h3 class="card-title">${x.title}</h3>
                            <p class="card-desc">${x.content.replace(/<[^>]*>?/gm, '')}</p>
                            <div class="card-footer">
                                <span><i class="fa-solid fa-book-open"></i> اقرأ الدليل</span>
                                <i class="fa-solid fa-arrow-left arrow-icon"></i>
                            </div>
                        </div>
                    </a>
                `).join('');
            }

            d.getElementById('sk-cont').classList.add('hidden');
            g.classList.remove('hidden');
        };

        d.getElementById('live-search').addEventListener('input', (e) => {
            _s = e.target.value.trim().toLowerCase();
            render();
        });

        d.querySelectorAll('.chip').forEach(c => {
            c.addEventListener('click', () => {
                d.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
                c.classList.add('active');
                _f = c.getAttribute('data-filter');
                render();
            });
        });

        const tog = d.getElementById('t-tog');
        tog.onclick = () => {
            const isD = d.documentElement.getAttribute('data-theme') === 'dark';
            d.documentElement.setAttribute('data-theme', isD ? 'light' : 'dark');
            localStorage.setItem('theme', isD ? 'light' : 'dark');
            tog.innerHTML = isD ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';
        };

        if (localStorage.getItem('theme') === 'dark') {
            d.documentElement.setAttribute('data-theme', 'dark');
            tog.innerHTML = '<i class="fa-solid fa-sun"></i>';
        }

        window.onscroll = () => {
            const pr = d.getElementById('r-prog');
            const h = d.documentElement.scrollHeight - d.documentElement.clientHeight;
            pr.style.width = (window.scrollY / h * 100) + "%";
        };

        init();
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
