<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل المقال... | guidefree pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* (احتفظت بنفس التنسيقات الأصلية الرائعة مع إضافة بسيطة لرسالة الخطأ) */
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --sub: #64748b;
            --accent: #3b82f6;
            --accent-dark: #1d4ed8;
            --border: #e2e8f0;
            --radius: 16px;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0b0f1a;
            --surface: #111827;
            --text: #f1f5f9;
            --sub: #94a3b8;
            --border: #1f2937;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.8; 
            transition: background-color 0.3s, color 0.3s; 
            overflow-x: hidden;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        a { text-decoration: none; color: inherit; }
        .hidden { display: none !important; }

        #reading-progress { 
            position: fixed; 
            top: 0; left: 0; 
            height: 4px; 
            background: linear-gradient(90deg, var(--accent), #8b5cf6); 
            z-index: 10000; 
            width: 0%; 
            transition: width 0.1s; 
        }

        .navbar { 
            position: sticky; 
            top: 0; 
            background: rgba(var(--surface), 0.9); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            border-bottom: 1px solid var(--border); 
            z-index: 1000; 
            padding: 12px 0; 
        }
        
        .nav-container { max-width: 900px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 1.6rem; font-weight: 900; }
        .brand span { color: var(--accent); }
        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .btn-icon { background: none; border: none; font-size: 1.3rem; color: var(--text); cursor: pointer; transition: 0.3s; }
        .btn-icon:hover { color: var(--accent); transform: rotate(15deg); }
        .btn-external { background: #25D366; color: #fff; padding: 8px 16px; border-radius: 50px; font-weight: 700; font-size: 0.9rem; }

        .main-container { max-width: 900px; margin: 0 auto; padding: 30px 20px 80px; }

        .breadcrumb { display: flex; align-items: center; gap: 8px; color: var(--sub); font-size: 0.95rem; margin-bottom: 25px; font-weight: 500; }
        .breadcrumb i { font-size: 0.7rem; }

        .article-wrapper { 
            background: var(--surface); 
            border-radius: var(--radius); 
            padding: 40px; 
            box-shadow: var(--shadow); 
            border: 1px solid var(--border);
            word-break: break-word; 
        }

        .badge { background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--accent); padding: 6px 16px; border-radius: 50px; font-weight: 700; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; }
        .title { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 900; line-height: 1.4; margin-bottom: 20px; word-break: break-word; }
        .meta { display: flex; gap: 20px; color: var(--sub); font-size: 0.95rem; font-weight: 500; border-bottom: 1px solid var(--border); padding-bottom: 25px; margin-bottom: 30px; }
        .meta i { color: var(--accent); }

        .featured-wrapper img { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            object-fit: cover; 
            border-radius: 12px; 
            margin-bottom: 35px; 
        }

        .content-area { font-size: 1.15rem; color: color-mix(in srgb, var(--text) 90%, transparent); }
        .content-area p { margin-bottom: 20px; line-height: 1.9; }
        .content-area h2 { font-size: 1.6rem; font-weight: 800; margin: 35px 0 15px; color: var(--text); }
        .content-area img { max-width: 100%; border-radius: 8px; margin: 20px 0; height: auto; }

        .cta-box { 
            background: linear-gradient(135deg, var(--accent), #6366f1); 
            border-radius: 16px; 
            padding: 40px 30px; 
            text-align: center; 
            color: #fff; 
            margin: 50px 0 20px; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); 
            transition: all 0.4s ease;
        }
        
        .cta-box.success-mode {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4); 
        }

        .cta-box::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%); }
        .cta-content { position: relative; z-index: 1; }
        .cta-content h3 { font-size: 1.6rem; font-weight: 900; margin-bottom: 15px; }
        .cta-content p { font-size: 1.05rem; opacity: 0.9; margin-bottom: 25px; }
        
        .main-btn { 
            background: #fff; 
            color: var(--accent); 
            border: none; 
            padding: 16px 35px; 
            border-radius: 50px; 
            font-size: 1.1rem; 
            font-weight: 900; 
            font-family: inherit; 
            cursor: pointer; 
            transition: 0.3s; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
        }
        
        .main-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .cta-box.success-mode .main-btn { color: #059669; }

        .next-steps { margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--border); }
        .share-title { font-weight: 700; margin-bottom: 15px; display: block; }
        .share-grid { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .s-btn { width: 45px; height: 45px; border-radius: 50%; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .s-btn:hover { transform: translateY(-4px); }
        .wa { background: #25D366; } .fb { background: #1877F2; } .tw { background: #000000; } .copy { background: var(--sub); }

        .related-section { margin-top: 40px; display: none; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 15px; }
        .related-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: 0.3s; display: block; }
        .related-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); border-color: var(--accent); }
        .related-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .related-info { padding: 15px; }
        .related-title { font-size: 1rem; font-weight: 700; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--text); }
        .related-meta { font-size: 0.8rem; color: var(--sub); }

        .sk-line { height: 24px; background: var(--border); margin-bottom: 15px; border-radius: 8px; width: 100%; animation: pulse 1.5s infinite; }
        .sk-line.long { height: 40px; width: 60%; }
        .sk-img { height: 350px; background: var(--border); border-radius: 12px; margin: 30px 0; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        .footer { text-align: center; padding: 25px; background: var(--surface); border-top: 1px solid var(--border); color: var(--sub); font-size: 0.95rem; }

        /* إضافة تنسيق لحالة عدم العثور على المقال */
        .error-state { text-align: center; padding: 50px 20px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
        .error-state i { font-size: 4rem; color: #ef4444; margin-bottom: 20px; }
        .error-state h2 { margin-bottom: 20px; color: var(--text); }

        @media (max-width: 768px) {
            .article-wrapper { padding: 25px 20px; border-radius: 0; border-left: none; border-right: none; }
            .main-container { padding: 20px 0 60px; }
            .cta-box { padding: 35px 20px; border-radius: 0; margin: 40px 0 0; }
        }
    </style>
</head>
<body>
    <div id="reading-progress"></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="brand">guidefree <span>pro</span></a>
            <div class="nav-actions">
                <button id="theme-toggle" class="btn-icon"><i class="fa-solid fa-moon"></i></button>
                <a href="https://wa.me/212607729170" target="_blank" class="btn-external"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
        </div>
    </nav>

    <main class="main-container">
        <div id="article-skeleton">
            <div class="sk-line long"></div>
            <div class="sk-line"></div>
            <div class="sk-img"></div>
            <div class="sk-line"></div>
            <div class="sk-line"></div>
        </div>

        <div id="error-state" class="error-state hidden">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <h2>عذراً، هذا المقال غير موجود أو تم حذفه</h2>
            <a href="index.html" class="main-btn" style="background: var(--accent); color: white;">العودة للرئيسية</a>
        </div>

        <div id="article-render" class="hidden">
            <nav class="breadcrumb">
                <a href="index.html">الرئيسية</a>
                <i class="fa-solid fa-chevron-left"></i>
                <span id="b-category">...</span>
            </nav>

            <article class="article-wrapper">
                <header class="post-header">
                    <span id="post-category" class="badge">...</span>
                    <h1 id="post-title" class="title">...</h1>
                    <div class="meta">
                        <span><i class="fa-regular fa-calendar"></i> <span id="post-date">...</span></span>
                        <span><i class="fa-regular fa-eye"></i> <span id="post-views">...</span> مشاهدة</span>
                    </div>
                </header>

                <div class="featured-wrapper">
                    <img id="post-image" src="" alt="صورة المقال البارزة">
                </div>

                <div id="post-content" class="content-area"></div>

                <div id="cta-container" class="cta-box">
                    <div class="cta-content">
                        <h3 id="cta-title"><i class="fa-solid fa-link"></i> جاهز للوصول للموقع؟</h3>
                        <p id="cta-desc">اضغط على الزر أدناه للانتقال المباشر إلى الأداة أو الموقع المشروح.</p>
                        <button id="cta-btn" class="main-btn"></button>
                    </div>
                </div>

                <section class="next-steps">
                    <span class="share-title">شارك الفائدة مع أصدقائك:</span>
                    <div class="share-grid">
                        <button id="btn-wa" class="s-btn wa"><i class="fa-brands fa-whatsapp"></i></button>
                        <button id="btn-fb" class="s-btn fb"><i class="fa-brands fa-facebook-f"></i></button>
                        <button id="btn-tw" class="s-btn tw"><i class="fa-brands fa-x-twitter"></i></button>
                        <button id="btn-copy" class="s-btn copy"><i class="fa-solid fa-link"></i></button>
                    </div>
                </section>
                
                <section class="related-section" id="related-section">
                    <span class="share-title" style="margin-bottom: 0;"><i class="fa-solid fa-fire"></i> مقالات مشابهة الأكثر زيارة:</span>
                    <div class="related-grid" id="related-grid">
                        </div>
                </section>
                
            </article>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 guidefree pro. جميع الحقوق محفوظة.</p>
    </footer>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, getDoc, updateDoc, increment, collection, query, where, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // === تعديل دالة التنسيق لتسمح بعرض الـ HTML الأساسي (الصور والفقرات) ===
        // قمنا بإزالة دالة _e التي كانت تدمر كود الـ HTML وتمنع ظهور الصور
        const _formatText = (rawText) => {
            if (!rawText) return '';
            let text = rawText; // نأخذ النص كما هو للسماح للـ HTML بالعمل
            
            // تطبيق أكواد التنسيق الخاصة بك
            text = text.replace(/#([\s\S]*?)#p/g, '<span style="font-size: 1.5em; color: red; font-weight: bold;">$1</span>');
            text = text.replace(/#([\s\S]*?)#green/g, '<span style="color: green;">$1</span>');
            text = text.replace(/#([\s\S]*?)#/g, '<span style="font-size: 1.5em; font-weight: bold;">$1</span>');
            
            // تحويل المسافات لأسطر فقط إذا لم تكن فقرات HTML
            if (!text.includes('<p>') && !text.includes('<br>')) {
                 text = text.replace(/\n/g, '<br>');
            }
            return text;
        };

        // دالة مخصصة لمسح الرموز من شريط المتصفح (Title Tab)
        const _stripTags = (rawText) => {
            if (!rawText) return '';
            let text = rawText;
            text = text.replace(/#([\s\S]*?)#p/g, '$1');
            text = text.replace(/#([\s\S]*?)#green/g, '$1');
            text = text.replace(/#([\s\S]*?)#/g, '$1');
            
            // تنظيف أي وسوم HTML إضافية لمنع ظهورها في عنوان الصفحة
            text = text.replace(/<[^>]*>?/gm, ''); 
            return text;
        };
        // ========================

        const docId = new URLSearchParams(window.location.search).get('id');

        const init = async () => {
            if (!docId) return window.location.href = 'index.html';
            
            try {
                // جلب بيانات المقال أولاً
                const docRef = doc(db, "posts", docId);
                const snap = await getDoc(docRef);
                
                if (snap.exists()) {
                    const data = snap.data();
                    renderData(data);
                    loadRelatedPosts(data.category);
                    
                    // زيادة عدد الزيارات في الخلفية بعد التأكد من وجود المقال
                    updateDoc(docRef, { views: increment(1) }).catch(err => console.error("Error updating views:", err));
                } else {
                    // المقال غير موجود (إظهار حالة الخطأ)
                    showErrorState();
                }
            } catch (e) {
                console.error("Error loading article:", e);
                showErrorState();
            }
        };

        const showErrorState = () => {
            document.getElementById('article-skeleton').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
            document.title = "المقال غير موجود | guidefree pro";
        };

        const renderData = (data) => {
            document.title = `${_stripTags(data.title)} | guidefree pro`;
            
            // تعبئة البيانات الأساسية
            document.getElementById('post-title').innerHTML = _formatText(data.title);
            document.getElementById('post-category').innerText = data.category || 'عام';
            document.getElementById('b-category').innerText = data.category || 'عام';
            document.getElementById('post-image').src = data.imageUrl || 'default-image.jpg'; // إضافة صورة افتراضية للطوارئ
            document.getElementById('post-content').innerHTML = _formatText(data.content);
            
            const viewsCount = (data.views || 0) + 1;
            document.getElementById('post-views').innerText = viewsCount;

            const dateStr = data.createdAt ? data.createdAt.toDate().toLocaleDateString('ar-EG') : 'حديثاً';
            document.getElementById('post-date').innerText = dateStr;

            // منطق أزرار CPA (Bait and Switch)
            setupCPALogic(data);
            
            // إعداد أزرار المشاركة
            setupSharing(_stripTags(data.title));

            // إخفاء الـ Skeleton وإظهار المحتوى
            document.getElementById('article-skeleton').classList.add('hidden');
            document.getElementById('article-render').classList.remove('hidden');
        };

        const setupCPALogic = (data) => {
            const btn = document.getElementById('cta-btn');
            const ctaContainer = document.getElementById('cta-container');
            const ctaTitle = document.getElementById('cta-title');
            const ctaDesc = document.getElementById('cta-desc');
            
            const hasClickedCPA = localStorage.getItem(`cpa_clicked_${docId}`);

            const switchToRealLink = () => {
                ctaContainer.classList.add('success-mode');
                ctaTitle.innerHTML = '<i class="fa-solid fa-circle-check"></i> تم تجهيز الرابط لك';
                ctaDesc.innerText = 'اضغط على الزر أدناه للانتقال فوراً للموقع المشروح.';
                btn.innerHTML = '<i class="fa-solid fa-arrow-up-right-from-square"></i> الانتقال للموقع الآن';
                btn.onclick = () => {
                    window.location.href = data.sourceUrl || '#'; 
                };
            };

            if (hasClickedCPA && data.sourceUrl) {
                switchToRealLink();
            } else {
                btn.innerHTML = '<i class="fa-solid fa-bolt"></i> ' + (data.buttonText || 'الانتقال إلى الرابط المشروح');
                
                btn.onclick = () => {
                    if (data.isLocked && typeof call_locker_function === 'function') {
                        call_locker_function(); 
                    } else if (data.targetUrl) {
                        window.open(data.targetUrl, '_blank'); 
                    }

                    if (data.sourceUrl) {
                        localStorage.setItem(`cpa_clicked_${docId}`, 'true');
                        switchToRealLink();
                    }
                };
            }
        };

        const loadRelatedPosts = async (category) => {
            if (!category) return;
            try {
                const q = query(collection(db, "posts"), where("category", "==", category), limit(10));
                const snap = await getDocs(q);
                
                let posts = [];
                snap.forEach(d => {
                    if (d.id !== docId) posts.push({ id: d.id, ...d.data() });
                });

                posts.sort((a, b) => (b.views || 0) - (a.views || 0));
                const topPosts = posts.slice(0, 3);

                if (topPosts.length > 0) {
                    let html = '';
                    topPosts.forEach(r => {
                        html += `
                            <a href="article.html?id=${r.id}" class="related-card">
                                <img src="${r.imageUrl || 'default.jpg'}" class="related-img" alt="${_stripTags(r.title)}">
                                <div class="related-info">
                                    <h4 class="related-title">${_formatText(r.title)}</h4>
                                    <span class="related-meta"><i class="fa-solid fa-eye"></i> ${r.views || 0} مشاهدة</span>
                                </div>
                            </a>
                        `;
                    });
                    
                    document.getElementById('related-grid').innerHTML = html;
                    document.getElementById('related-section').style.display = 'block';
                }
            } catch (e) { console.error("Error loading related posts", e); }
        };

        const setupSharing = (title) => {
            const url = window.location.href;
            document.getElementById('btn-wa').onclick = () => window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(title + ' - ' + url)}`, '_blank');
            document.getElementById('btn-fb').onclick = () => window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
            document.getElementById('btn-tw').onclick = () => window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}`, '_blank');
            
            document.getElementById('btn-copy').onclick = async () => {
                try {
                    await navigator.clipboard.writeText(url);
                    const btnCopy = document.getElementById('btn-copy');
                    const originalHTML = btnCopy.innerHTML;
                    btnCopy.innerHTML = '<i class="fa-solid fa-check"></i>';
                    setTimeout(() => btnCopy.innerHTML = originalHTML, 2000);
                } catch (err) {}
            };
        };

        // الثيم (المظلم / المضيء)
        const themeTog = document.getElementById('theme-toggle');
        const applyTheme = (isDark) => {
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            themeTog.innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        };

        themeTog.onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') !== 'dark';
            applyTheme(isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        if (localStorage.getItem('theme') === 'dark') {
            applyTheme(true);
        }

        // شريط التمرير
        window.onscroll = () => {
            const prog = document.getElementById('reading-progress');
            const h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            prog.style.width = (window.scrollY / h * 100) + "%";
        };

        init();
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
