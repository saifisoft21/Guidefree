<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | guidefree pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-accent: #6366f1;
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-secondary: #94a3b8;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-full: 9999px;
            --transition: all 0.3s ease;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-primary: #0f172a;
            --border-color: #e2e8f0;
            --text-secondary: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--primary-accent); border-radius: 10px; }

        body { color: var(--text-primary); background-color: var(--bg-color); min-height: 100vh; transition: var(--transition); }

        #login-section { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(circle at 50% -20%, #4f46e5 0%, var(--bg-color) 60%); flex-direction: column; position: fixed; inset: 0; z-index: 9999; }

        .mascot-container { position: relative; width: 120px; height: 120px; margin: 0 auto -20px auto; z-index: 10; pointer-events: none; }
        .head { width: 100%; height: 100%; background: #fbbf24; border-radius: 50%; position: relative; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.3); overflow: hidden; transition: transform 0.3s ease; }
        .head::before, .head::after { content: ''; position: absolute; width: 30px; height: 30px; background: #f59e0b; border-radius: 50%; top: 20px; z-index: -1; }
        .head::before { left: -10px; } .head::after { right: -10px; }
        .eye { width: 28px; height: 32px; background: white; border-radius: 50%; position: absolute; top: 35px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }
        .eye.left { left: 25px; } .eye.right { right: 25px; }
        .pupil { width: 12px; height: 12px; background: #1e293b; border-radius: 50%; transition: transform 0.1s ease-out; position: relative; }
        .pupil::after { content: ''; position: absolute; width: 4px; height: 4px; background: white; border-radius: 50%; top: 2px; left: 2px; }
        .mouth { width: 20px; height: 10px; background: #b45309; border-radius: 0 0 20px 20px; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); transition: all 0.3s ease; }
        .hand { width: 35px; height: 35px; background: #fbbf24; border-radius: 50%; position: absolute; bottom: -15px; box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1); transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 20; }
        .hand.left { left: 10px; transform: translateY(50px); }
        .hand.right { right: 10px; transform: translateY(50px); }
        .hands-up .hand.left { transform: translateY(-65px) translateX(15px) scale(1.1); }
        .hands-up .hand.right { transform: translateY(-65px) translateX(-15px) scale(1.1); }
        .hands-up .mouth { width: 10px; height: 10px; border-radius: 50%; bottom: 25px; }
        .peek .hand.left { transform: translateY(-65px) translateX(15px) scale(1.1); }
        .peek .hand.right { transform: translateY(-40px) translateX(-30px) scale(0.9); }

        .login-card { background: var(--surface-color); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 3rem 2.5rem; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid var(--border-color); width: 90%; max-width: 420px; text-align: center; position: relative; z-index: 1; }
        .login-card h1 { margin-bottom: 2rem; font-size: 2rem; margin-top: 10px; }
        .login-card h1 span { background: linear-gradient(135deg, var(--primary-accent), #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .login-form-group { position: relative; margin-bottom: 1.5rem; text-align: right; }
        .login-form-control { width: 100%; background: rgba(15, 23, 42, 0.6); border: 2px solid var(--border-color); border-radius: 14px; padding: 1.2rem; padding-right: 3rem; color: white; font-size: 1.05rem; transition: all 0.3s ease; outline: none; direction: ltr; }
        .login-form-control:focus { border-color: var(--primary-accent); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); transform: translateY(-2px); }
        
        .input-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); font-size: 1.2rem; transition: 0.3s; }
        .login-form-control:focus + .input-icon { color: var(--primary-accent); }
        .toggle-password { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 1.2rem; transition: 0.3s; z-index: 20; }
        .toggle-password:hover { color: white; }

        .btn-login { background: linear-gradient(135deg, var(--primary-accent) 0%, #8b5cf6 100%); border-radius: 14px; padding: 1.2rem; font-size: 1.2rem; font-weight: bold; color: white; border: none; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 1rem; transition: all 0.3s ease; }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(99, 102, 241, 0.6); }

        .error-msg { color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); padding: 0.8rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.95rem; display: none; font-weight: bold; }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } }

        #admin-section { display: none; }
        
        .admin-body-bg { background: radial-gradient(circle at 0% 0%, color-mix(in srgb, var(--primary-accent) 8%, var(--bg-color)) 0%, var(--bg-color) 50%, color-mix(in srgb, #8b5cf6 5%, var(--bg-color)) 100%); background-attachment: fixed; }

        .admin-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .admin-nav { background: color-mix(in srgb, var(--surface-color) 80%, transparent); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; max-width: 1200px; margin: 0 auto; }
        .brand { font-size: 1.5rem; font-weight: 900; text-decoration: none; color: var(--text-primary); }
        .brand span { background: linear-gradient(135deg, var(--primary-accent), #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-actions { display: flex; gap: 1rem; }
        .btn-icon { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.3s ease; }
        .btn-icon:hover { background: var(--border-color); }
        .danger-icon { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
        .danger-icon:hover { background: #ef4444; color: #fff; border-color: #ef4444; }

        .admin-title { font-size: 2.2rem; font-weight: 900; margin-bottom: 1.5rem; }

        .stat-card { background: var(--surface-color); padding: 1.5rem 2rem; border-radius: var(--radius-lg); border: 1px solid var(--border-color); display: flex; align-items: center; gap: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-icon { font-size: 2.5rem; color: var(--primary-accent); }
        .stat-value { font-size: 2rem; font-weight: 900; color: var(--text-primary); display: block; }
        .stat-label { color: var(--text-secondary); font-weight: bold; }

        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; margin: 2rem 0; }
        .admin-card { background: var(--surface-color); border-radius: var(--radius-lg); padding: 2.5rem; border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-title { font-size: 1.4rem; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); font-weight: 900; color: var(--text-primary); }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 0.5rem; color: var(--text-primary); }
        .form-control { width: 100%; background: color-mix(in srgb, var(--bg-color) 50%, transparent); border: 2px solid var(--border-color); border-radius: 12px; padding: 1rem; color: var(--text-primary); font-size: 1rem; transition: 0.3s; outline: none; }
        .form-control:focus { border-color: var(--primary-accent); }
        .editor-textarea { min-height: 200px; resize: vertical; }

        .monetization-box { background: color-mix(in srgb, #f59e0b 10%, transparent); border: 1px solid #f59e0b; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; }
        .monetization-box h3 { color: #f59e0b; margin-bottom: 1rem; font-size: 1.1rem; }
        
        .switch-container { display: flex; gap: 2rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .switch-label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: bold; color: var(--text-primary); }
        .switch-label input { display: none; }
        .slider { width: 44px; height: 24px; background-color: var(--border-color); border-radius: 34px; position: relative; transition: .4s; }
        .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .4s; }
        .switch-label input:checked + .slider { background-color: var(--primary-accent); }
        .switch-label input:checked + .slider:before { transform: translateX(20px); }

        .image-preview-container { margin-top: 10px; height: 180px; border-radius: 12px; border: 2px dashed var(--border-color); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .image-preview-container img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .image-preview-container i { font-size: 2rem; color: var(--text-secondary); }

        .btn-publish { background: var(--primary-accent); color: #fff; border: none; padding: 1.2rem; border-radius: 12px; width: 100%; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-publish:hover { opacity: 0.9; transform: translateY(-2px); }

        .skeleton-post-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--border-color); }
        .post-item-content { display: flex; align-items: center; gap: 15px; }
        .delete-post-btn { background: none; border: none; color: #ef4444; font-size: 1.2rem; cursor: pointer; }

        .toast { background: #10b981; padding: 1rem 2rem; border-radius: 50px; color: white; position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); transition: 0.5s; z-index: 10000; font-weight: bold; display: flex; gap: 10px; align-items: center; }
        .toast.show { bottom: 30px; }

        @media (max-width: 992px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="mascot-container" id="mascot">
            <div class="head">
                <div class="eye left"><div class="pupil"></div></div>
                <div class="eye right"><div class="pupil"></div></div>
                <div class="mouth"></div>
            </div>
            <div class="hand left"></div>
            <div class="hand right"></div>
        </div>

        <div class="login-card">
            <h1>guidefree <span>admin</span></h1>
            <div id="login-error-message" class="error-msg"></div>
            
            <form id="login-form" onsubmit="event.preventDefault();">
                <div class="login-form-group">
                    <input type="email" id="login-email" class="login-form-control" placeholder="البريد الإلكتروني" required>
                    <i class="fa-solid fa-envelope input-icon"></i>
                </div>
                
                <div class="login-form-group">
                    <input type="password" id="login-password" class="login-form-control" placeholder="كلمة المرور" required>
                    <button type="button" class="toggle-password" id="toggle-pwd">
                        <i class="fa-solid fa-eye-slash" id="toggle-icon"></i>
                    </button>
                </div>
                
                <button type="submit" class="btn-login" id="login-btn">
                    <span>تسجيل الدخول</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="admin-section">
        <nav class="navbar admin-nav">
            <div class="nav-container">
                <a href="#" class="brand">guidefree <span>admin</span></a>
                <div class="nav-actions">
                    <button id="theme-toggle" class="btn-icon">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <button id="logout-btn" class="btn-icon danger-icon">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="admin-container">
            <div style="margin-top: 2rem;">
                <h1 class="admin-title">لوحة التحكم</h1>
                <div class="stat-card">
                    <i class="fa-solid fa-file-lines stat-icon"></i>
                    <div>
                        <span class="stat-value" id="total-posts">-</span>
                        <span class="stat-label">إجمالي المقالات المنشورة</span>
                    </div>
                </div>
            </div>

            <div class="dashboard-grid">
                <section class="admin-card">
                    <h2 class="card-title"><i class="fa-solid fa-pen-nib"></i> نشر محتوى جديد</h2>
                    <form id="publish-form">
                        <div class="form-group">
                            <label>عنوان المقال <span id="title-counter" style="float:left; font-size:0.8rem; color:var(--text-secondary);">0 / 60</span></label>
                            <input type="text" id="post-title" class="form-control" required autocomplete="off" placeholder="اكتب عنواناً جذاباً..." maxlength="60">
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label>التصنيف</label>
                                <select id="post-category" class="form-control" required>
                                    <option value="" disabled selected>اختر التصنيف...</option>
                                    <option value="ai">أدوات ذكاء اصطناعي</option>
                                    <option value="design">تصميم ومونتاج</option>
                                    <option value="tricks">حيل وأسرار</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>رابط الصورة</label>
                                <input type="url" id="post-image" class="form-control" required autocomplete="off" placeholder="https://example.com/img.jpg">
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="image-preview-container" id="preview-container">
                                <i class="fa-regular fa-image" id="preview-icon"></i>
                                <img id="image-preview" src="">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>محتوى المقال</label>
                            <textarea id="post-content" class="form-control editor-textarea" required placeholder="اكتب التفاصيل هنا..."></textarea>
                        </div>

                        <div class="monetization-box">
                            <h3><i class="fa-solid fa-coins"></i> إعدادات الربح (CPA / Affiliate)</h3>
                            
                            <div class="switch-container">
                                <label class="switch-label">
                                    <input type="checkbox" id="isLocked">
                                    <div class="slider"></div> قفل المحتوى (CPA)
                                </label>
                                <label class="switch-label">
                                    <input type="checkbox" id="isAffiliate">
                                    <div class="slider"></div> رابط أفلييت (موصى به)
                                </label>
                            </div>

                            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label>الرابط المستهدف (URL أو كود العرض)</label>
                                    <input type="url" id="targetUrl" class="form-control" placeholder="https://..." required>
                                </div>
                                <div class="form-group">
                                    <label>نص الزر</label>
                                    <input type="text" id="buttonText" class="form-control" placeholder="مثال: اضغط هنا">
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn-publish" id="publish-btn">نشر المقال الآن</button>
                    </form>
                </section>

                <aside class="admin-card">
                    <h2 class="card-title"><i class="fa-solid fa-clock-rotate-left"></i> المنشورات السابقة</h2>
                    <div id="admin-skeleton" style="text-align: center; padding: 2rem;">
                        <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem;"></i>
                    </div>
                    <div id="recent-posts-container" style="display: none; flex-direction: column; gap: 10px;"></div>
                </aside>
            </div>
        </main>
    </div>

    <div id="toast-notification" class="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toast-message"></span>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const el = (id) => document.getElementById(id);
        
        const LOGIN = {
            section: el('login-section'), form: el('login-form'), email: el('login-email'),
            password: el('login-password'), errorMsg: el('login-error-message'), btn: el('login-btn'),
            mascot: el('mascot'), togglePwd: el('toggle-pwd'), toggleIcon: el('toggle-icon')
        };

        const ADMIN = {
            section: el('admin-section'), form: el('publish-form'), btn: el('publish-btn'),
            title: el('post-title'), counter: el('title-counter'), cat: el('post-category'),
            imgIn: el('post-image'), pCont: el('preview-container'), pImg: el('image-preview'),
            pIcon: el('preview-icon'), content: el('post-content'),
            isL: el('isLocked'), isA: el('isAffiliate'), tUrl: el('targetUrl'), bTxt: el('buttonText'),
            skel: el('admin-skeleton'), posts: el('recent-posts-container'), toast: el('toast-notification'),
            logout: el('logout-btn'), theme: el('theme-toggle'), totPosts: el('total-posts')
        };

        let isSubmitting = false;

        LOGIN.email.oninput = (e) => {
            const v = e.target.value.length;
            document.querySelectorAll('.pupil').forEach(p => p.style.transform = `translate(${Math.min(v, 15)}px, 5px)`);
        };
        LOGIN.password.onfocus = () => LOGIN.mascot.classList.add('hands-up');
        LOGIN.password.onblur = () => LOGIN.mascot.classList.remove('hands-up', 'peek');
        LOGIN.togglePwd.onclick = () => {
            const isP = LOGIN.password.type === 'password';
            LOGIN.password.type = isP ? 'text' : 'password';
            LOGIN.toggleIcon.className = isP ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
            LOGIN.mascot.classList.toggle('peek', isP);
        };

        LOGIN.form.onsubmit = async (e) => {
            e.preventDefault();
            try {
                LOGIN.btn.disabled = true;
                LOGIN.errorMsg.style.display = 'none';
                await signInWithEmailAndPassword(auth, LOGIN.email.value.trim(), LOGIN.password.value);
                LOGIN.form.reset();
            } catch (err) {
                LOGIN.errorMsg.style.display = 'block';
                LOGIN.errorMsg.innerText = "بيانات غير صحيحة";
                LOGIN.form.classList.add('shake');
                setTimeout(() => LOGIN.form.classList.remove('shake'), 400);
            } finally {
                LOGIN.btn.disabled = false;
            }
        };

        const showT = (msg, err = false) => {
            el('toast-message').textContent = msg;
            ADMIN.toast.style.background = err ? '#ef4444' : '#10b981';
            ADMIN.toast.classList.add('show');
            setTimeout(() => ADMIN.toast.classList.remove('show'), 3000);
        };

        ADMIN.title.oninput = (e) => {
            const l = e.target.value.length;
            ADMIN.counter.textContent = `${l} / 60`;
            ADMIN.counter.style.color = l >= 55 ? '#ef4444' : 'var(--text-secondary)';
        };

        ADMIN.imgIn.oninput = (e) => {
            const u = e.target.value.trim();
            if (u.startsWith('http')) {
                ADMIN.pImg.src = u;
                ADMIN.pImg.style.display = 'block';
                ADMIN.pIcon.style.display = 'none';
            } else {
                ADMIN.pImg.style.display = 'none';
                ADMIN.pIcon.style.display = 'block';
            }
        };

        window.delPost = async (id) => {
            if (confirm("تأكيد الحذف؟")) {
                try {
                    await deleteDoc(doc(db, "posts", id));
                    showT('تم الحذف');
                    loadD();
                } catch (e) { showT('خطأ', true); }
            }
        };

        const loadD = async () => {
            ADMIN.skel.style.display = 'block';
            ADMIN.posts.style.display = 'none';
            ADMIN.posts.innerHTML = '';
            
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(10));
            const snap = await getDocs(q);
            
            ADMIN.skel.style.display = 'none';
            ADMIN.posts.style.display = 'flex';
            
            let c = 0;
            snap.forEach((d) => {
                c++;
                const v = d.data();
                ADMIN.posts.innerHTML += `
                    <div class="skeleton-post-item">
                        <div class="post-item-content">
                            <img src="${v.imageUrl}" style="width:50px;height:50px;border-radius:8px;object-fit:cover;">
                            <div>
                                <h4 style="font-size:0.9rem;margin-bottom:5px;">${v.title}</h4>
                                <span style="font-size:0.7rem;color:#6366f1;">${v.category}</span>
                            </div>
                        </div>
                        <button onclick="delPost('${d.id}')" class="delete-post-btn"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });
            ADMIN.totPosts.textContent = c;
        };

        ADMIN.form.onsubmit = async (e) => {
            e.preventDefault();
            if (isSubmitting) return;

            const pData = {
                title: ADMIN.title.value.trim(),
                category: ADMIN.cat.value,
                imageUrl: ADMIN.imgIn.value.trim(),
                content: ADMIN.content.value.trim(),
                isLocked: ADMIN.isL.checked,
                isAffiliate: ADMIN.isA.checked,
                targetUrl: ADMIN.tUrl.value.trim(),
                buttonText: ADMIN.bTxt.value.trim() || (ADMIN.isL.checked ? 'افتح العرض' : 'زيارة الرابط'),
                createdAt: serverTimestamp()
            };

            try {
                isSubmitting = true;
                ADMIN.btn.textContent = 'جاري النشر...';
                await addDoc(collection(db, "posts"), pData);
                showT('تم النشر بنجاح!');
                ADMIN.form.reset();
                ADMIN.pImg.style.display = 'none';
                ADMIN.pIcon.style.display = 'block';
                ADMIN.counter.textContent = '0 / 60';
                loadD();
            } catch (err) {
                showT('خطأ في النشر', true);
            } finally {
                isSubmitting = false;
                ADMIN.btn.textContent = 'نشر المقال الآن';
            }
        };

        ADMIN.theme.onclick = () => {
            const isD = document.documentElement.getAttribute('data-theme') === 'dark';
            const nT = isD ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', nT);
            localStorage.setItem('theme', nT);
            ADMIN.theme.innerHTML = isD ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';
        };

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            ADMIN.theme.innerHTML = '<i class="fa-solid fa-sun"></i>';
        }

        ADMIN.logout.onclick = async () => { if (confirm("تسجيل الخروج؟")) await signOut(auth); };

        onAuthStateChanged(auth, (u) => {
            if (u) {
                LOGIN.section.style.display = 'none';
                ADMIN.section.style.display = 'block';
                document.body.style.overflow = 'auto';
                loadD();
            } else {
                LOGIN.section.style.display = 'flex';
                ADMIN.section.style.display = 'none';
                document.body.style.overflow = 'hidden';
            }
        });
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
